<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BIST AI Analiz</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: #00b2ff;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        input {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #222630;
            background-color: #161a25;
            color: white;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 0 20px;
            border-radius: 12px;
            border: none;
            background-color: #00b2ff;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .card {
            background-color: #161a25;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none; /* Arama yapılana kadar gizli */
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .symbol { font-size: 28px; font-weight: bold; }
        .price { font-size: 24px; font-weight: bold; color: #00e676; }
        .signal-box {
            background-color: rgba(0, 178, 255, 0.1);
            border: 1px solid #00b2ff;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
            font-size: 18px;
            font-weight: bold;
        }
        .indicator-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #222630;
        }
        .label { color: #848e9c; }
        .value { font-weight: 500; }
        .news-box {
            background-color: #0b0e14;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #b5b7bc;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 BIST Sinyal Motoru</h1>
    
    <div class="search-box">
        <input type="text" id="hisseKodu" placeholder="Hisse Kodu Girin (Örn: THYAO)" oninput="this.value = this.value.toUpperCase()">
        <button onclick="analizEt()">Ara</button>
    </div>

    <div class="card" id="sonucKarti">
        <div class="header-row">
            <div>
                <div class="symbol" id="lblHisse">-</div>
                <div style="color: #848e9c; font-size: 14px;">Borsa İstanbul</div>
            </div>
            <div class="price" id="lblFiyat">0.00 TL</div>
        </div>

        <div class="signal-box" id="lblStrateji">
            Sinyal Hesaplanıyor...
        </div>

        <div class="indicator-row">
            <span class="label">🎯 Alım Seviyesi (Destek)</span>
            <span class="value" style="color: #00e676;" id="lblDestek">0.00 TL</span>
        </div>
        <div class="indicator-row">
            <span class="label">🚀 Satım Seviyesi (Direnç)</span>
            <span class="value" style="color: #ff3b30;" id="lblDirenc">0.00 TL</span>
        </div>

        <div class="indicator-row" style="margin-top: 15px;">
            <span class="label">RSI (14)</span>
            <span class="value" id="lblRSI">-</span>
        </div>
        <div class="indicator-row">
            <span class="label">MACD Durumu</span>
            <span class="value" id="lblMACD">-</span>
        </div>
        <div class="indicator-row">
            <span class="label">Ichimoku Bulutu</span>
            <span class="value" style="color: #00e676;">Boğa Eğilimi</span>
        </div>

        <p class="label" style="margin-top: 20px; margin-bottom: 5px;">📰 Son KAP Özet Analizi</p>
        <div class="news-box" id="lblKAP">
            Şirket faaliyetlerinde indikatörleri olumsuz etkileyecek bir KAP haberi bulunmuyor.
        </div>
    </div>
</div>

<script>
    function analizEt() {
        const kod = document.getElementById('hisseKodu').value;
        if(!kod) return alert("Lütfen bir hisse kodu girin!");

        // Python backend'e istek atıyoruz
        fetch(`http://127.0.0.1:5000/api/analiz?hisse=${kod}`)
        .then(response => response.json())
        .then(data => {
            if(data.hata) {
                alert(data.hata);
                return;
            }
            // Arayüzü gelen verilerle doldur
            document.getElementById('lblHisse').innerText = data.Hisse;
            document.getElementById('lblFiyat').innerText = data.Fiyat + " TL";
            document.getElementById('lblStrateji').innerText = data.Strateji;
            document.getElementById('lblDestek').innerText = data.Destek + " TL";
            document.getElementById('lblDirenc').innerText = data.Direnç + " TL";
            document.getElementById('lblRSI').innerText = data.RSI;
            document.getElementById('lblMACD').innerText = data.MACD;
            
            // Kartı görünür yap
            document.getElementById('sonucKarti').style.display = 'block';
        })
        .catch(err => {
            alert("Veri çekme hatası! Python sunucunuzun açık olduğundan emin olun.");
        });
    }
</script>
</body>
</html>
