<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BIST Mobil Analiz</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            margin: 0;
            padding: 15px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-size: 22px; text-align: center; color: #00b2ff; margin-bottom: 15px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #222630; background-color: #161a25; color: white; font-size: 16px; }
        button { padding: 0 20px; border-radius: 10px; border: none; background-color: #00b2ff; color: white; font-weight: bold; font-size: 16px; }
        .widget-container { background-color: #161a25; border-radius: 12px; padding: 10px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .widget-title { font-size: 14px; color: #848e9c; margin-bottom: 8px; font-weight: bold; }
        #chart-area, #tech-area { height: 350px; width: 100%; border-radius: 8px; overflow: hidden; }
        #tech-area { height: 420px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 BIST Akıllı Analiz</h1>
    
    <div class="search-box">
        <input type="text" id="hisseInput" value="THYAO" placeholder="Hisse Kodu (Örn: THYAO)" oninput="this.value = this.value.toUpperCase()">
        <button onclick="analizBaslat()">Analiz Et</button>
    </div>

    <div class="widget-container">
        <div class="widget-title">📈 Canlı Teknik Grafik</div>
        <div id="chart-area"></div>
    </div>

    <div class="widget-container">
        <div class="widget-title">🤖 İndikatör Al-Sat Durumu</div>
        <div id="tech-area"></div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script type="text/javascript">
    // Sayfa ilk açıldığında THYAO analizini yükle
    window.onload = function() {
        analizBaslat();
    };

    function analizBaslat() {
        let hisse = document.getElementById('hisseInput').value.trim();
        if(!hisse) return alert("Lütfen hisse kodu girin!");

        // 1. Grafik Widget'ını Güncelle
        new TradingView.widget({
            "width": "100%",
            "height": 350,
            "symbol": "BIST:" + hisse,
            "interval": "D",
            "timezone": "Europe/Istanbul",
            "theme": "dark",
            "style": "1",
            "locale": "tr",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "chart-area"
        });

        // 2. Teknik Analiz (RSI, MACD, Ichimoku Al-Sat Sinyalleri) Widget'ını Güncelle
        document.getElementById('tech-area').innerHTML = ""; // Öncekini temizle
        
        let script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
        script.async = true;
        
        // TradingView'den indikatör verilerini çeken ayar paketi
        let ayarlar = {
            "interval": "1D",
            "width": "100%",
            "isTransparent": false,
            "height": 420,
            "symbol": "BIST:" + hisse,
            "showIntervalTabs": true,
            "locale": "tr",
            "colorTheme": "dark"
        };
        
        script.innerHTML = JSON.stringify(ayarlar);
        document.getElementById('tech-area').appendChild(script);
    }
</script>

</body>
</html>
